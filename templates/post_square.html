<!DOCTYPE html>
<!-- post_square.html — Post quadrado 1080×1080.
     Substituição via string.Template (placeholders $var). CSS fica literal.
     Variáveis: $width $height $gold $navy $navy_dark
                $background_image $logo $headline $subheadline_html
                $body_text $cta_text
                $font_playfair_700 $font_montserrat_400 $font_montserrat_600 -->
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<style>
  /* Fontes embarcadas como data URI — composer.py injeta os blobs.
     Zero dependência de Google Fonts: a demo funciona offline. */
  @font-face {
    font-family: 'Playfair Display';
    font-style: normal;
    font-weight: 700;
    src: url('$font_playfair_700') format('woff2');
  }
  @font-face {
    font-family: 'Montserrat';
    font-style: normal;
    font-weight: 400;
    src: url('$font_montserrat_400') format('woff2');
  }
  @font-face {
    font-family: 'Montserrat';
    font-style: normal;
    font-weight: 600;
    src: url('$font_montserrat_600') format('woff2');
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: ${width}px;
    height: ${height}px;
    overflow: hidden;
    position: relative;
    font-family: 'Montserrat', sans-serif;
  }

  .bg {
    position: absolute;
    inset: 0;
    background-image: url('$background_image');
    background-size: cover;
    background-position: center;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(26, 32, 56, 0.93) 0%,
      rgba(26, 32, 56, 0.55) 55%,
      rgba(26, 32, 56, 0.15) 100%
    );
  }

  .content {
    position: absolute;
    inset: 0;
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .gold-rule {
    width: 48px;
    height: 3px;
    background: $gold;
    margin-bottom: 20px;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 52px;
    line-height: 1.15;
    color: #FFFFFF;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }

  .subheadline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .body-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 18px;
    line-height: 1.65;
    color: rgba(255,255,255,0.88);
    margin-bottom: 28px;
    max-width: 85%;
  }

  .cta {
    display: inline-block;
    padding: 12px 24px;
    background: transparent;
    border: 1.5px solid $gold;
    color: $gold;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    width: fit-content;
  }

  .logo {
    position: absolute;
    bottom: 28px;
    right: 28px;
    height: 56px;
    width: auto;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="gold-rule"></div>
    <h1 class="headline">$headline</h1>
    $subheadline_html
    <p class="body-text">$body_text</p>
    <div class="cta">$cta_text</div>
  </div>
  <img class="logo" src="$logo" alt="Mendes & Vaz">
</body>
</html>
