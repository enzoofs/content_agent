<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central de Conteúdo — Mendes &amp; Vaz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/">
      <img src="logo.png" alt="Mendes & Vaz" class="brand-logo">
      <div class="brand-text">
        <span class="brand-name">Mendes &amp; Vaz</span>
        <span class="brand-sub">Central de Conteúdo</span>
      </div>
    </a>
    <nav class="topnav">
      <a href="#/" class="navlink">Campanhas</a>
      <a href="#/calendario" class="navlink">Calendário</a>
      <a href="#/novo" class="navlink navlink-cta">+ Nova campanha</a>
    </nav>
  </header>

  <main id="app">
    <p class="loading">Carregando…</p>
  </main>

  <!-- Modal de ampliação da imagem -->
  <div id="modal" class="modal hidden">
    <span class="modal-close" id="modal-close">&times;</span>
    <img id="modal-img" src="" alt="Preview ampliado">
  </div>

  <!-- Modal de edição manual de copy -->
  <div id="edit-modal" class="edit-modal hidden">
    <div class="edit-modal-box">
      <div class="edit-modal-header">
        <h2 id="edit-modal-title">Editar copy</h2>
        <button class="edit-modal-close" id="edit-modal-close" aria-label="Fechar">&times;</button>
      </div>
      <form id="edit-form" class="edit-form"></form>
      <div class="edit-modal-actions">
        <button class="btn btn-adjust" id="edit-cancel">Cancelar</button>
        <button class="btn btn-approve" id="edit-save">Salvar e recompor</button>
      </div>
      <p class="edit-modal-hint">Sobrescreve a versão atual de copy. Não chama a OpenAI (custo zero).</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
